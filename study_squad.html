<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 The Study Squad</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #07071a;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --accent: #6EE7F7;
  --accent2: #FFD166;
  --accent3: #FF6B9D;
  --text: #fff;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(80,0,180,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(0,80,180,0.2) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, #09091f 0%, #05050f 100%);
  z-index: -1;
}

/* ─── Stars ─── */
.stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--del);
}
@keyframes twinkle {
  0%,100% { opacity: 0.08; }
  50%      { opacity: 0.85; }
}

/* ─── Header ─── */
header { text-align: center; padding: 36px 20px 10px; }
.title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2rem, 6vw, 4.2rem);
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleGlow 4s ease-in-out infinite;
  line-height: 1.15;
}
@keyframes titleGlow {
  0%,100% { filter: brightness(1) drop-shadow(0 0 10px rgba(110,231,247,0)); }
  50%      { filter: brightness(1.15) drop-shadow(0 0 20px rgba(110,231,247,0.4)); }
}
.subtitle { color: rgba(255,255,255,0.55); font-size: 1rem; font-weight: 700; margin-top: 6px; }
.stats {
  display: flex; justify-content: center; gap: 12px;
  flex-wrap: wrap; margin: 18px auto 0; max-width: 700px;
}
.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 7px 18px;
  font-size: 0.8rem;
  font-weight: 800;
  backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 6px;
}

/* ─── Live Chat Banner ─── */
.chat-banner {
  max-width: 780px;
  margin: 20px auto 0;
  padding: 0 20px;
  height: 64px;
  overflow: hidden;
  position: relative;
}
.chat-banner::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20px; right: 20px;
  height: 30px;
  background: linear-gradient(to top, var(--bg), transparent);
}
.chat-msg {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  border-left: 3px solid;
  font-size: 0.82rem;
  margin-bottom: 6px;
  animation: slideDown 0.4s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Grid ─── */
.grid-wrap { max-width: 1440px; margin: 20px auto; padding: 0 16px 60px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
  gap: 12px;
}

/* ─── Avatar Card ─── */
.card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 12px 8px 10px;
  text-align: center;
  cursor: pointer;
  position: relative;
  backdrop-filter: blur(10px);
  transition: transform 0.22s cubic-bezier(.175,.885,.32,1.275),
              border-color 0.3s, box-shadow 0.3s;
  animation: cardIn 0.5s ease both;
  overflow: visible;
}
@keyframes cardIn {
  from { opacity:0; transform: scale(0.75) translateY(24px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.card:hover {
  transform: translateY(-7px) scale(1.05);
  border-color: rgba(255,255,255,0.28);
  box-shadow: 0 14px 35px rgba(0,0,0,0.4);
}
.card.talking {
  border-color: var(--accent) !important;
  box-shadow: 0 0 22px rgba(110,231,247,0.55) !important;
  animation: cardIn 0.5s ease both, talkPulse 1.2s ease-in-out infinite !important;
}
.card.listening {
  border-color: var(--accent3) !important;
  box-shadow: 0 0 22px rgba(255,107,157,0.5) !important;
  animation: cardIn 0.5s ease both, lisPulse 1.2s ease-in-out infinite !important;
}
@keyframes talkPulse {
  0%,100% { box-shadow: 0 0 14px rgba(110,231,247,0.3); }
  50%      { box-shadow: 0 0 32px rgba(110,231,247,0.7); }
}
@keyframes lisPulse {
  0%,100% { box-shadow: 0 0 14px rgba(255,107,157,0.3); }
  50%      { box-shadow: 0 0 32px rgba(255,107,157,0.7); }
}

.avatar-wrap {
  width: 78px; height: 78px;
  margin: 0 auto 8px;
  position: relative;
}
.avatar-wrap svg {
  width: 100%; height: 100%;
  animation: float var(--fd,3s) ease-in-out infinite;
  animation-delay: var(--fds,0s);
  transition: transform 0.2s;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}
.card:active .avatar-wrap svg { transform: scale(0.9) rotate(-5deg); }

.emoji-badge {
  position: absolute;
  bottom: -4px; right: -4px;
  font-size: 17px;
  background: #09091f;
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid rgba(255,255,255,0.15);
  line-height: 1;
}
.char-name {
  font-family: 'Fredoka One', cursive;
  font-size: 0.88rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.char-label {
  font-size: 0.58rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: rgba(255,255,255,0.45);
  line-height: 1.3;
  margin-top: 2px;
}

/* ─── Speech Bubble ─── */
.bubble {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color: #1a1a2e;
  border-radius: 14px;
  padding: 9px 13px;
  font-size: 0.75rem;
  font-weight: 700;
  max-width: 200px;
  text-align: left;
  z-index: 200;
  pointer-events: none;
  white-space: normal;
  line-height: 1.4;
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  animation: bubblePop 0.32s cubic-bezier(.175,.885,.32,1.275);
}
.bubble::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: #fff;
}
@keyframes bubblePop {
  from { opacity: 0; transform: translateX(-50%) scale(0.4); }
  to   { opacity: 1; transform: translateX(-50%) scale(1); }
}

/* ─── Floating notification ─── */
.notif {
  position: fixed;
  top: 18px; right: 18px;
  background: rgba(9,9,31,0.92);
  border: 1px solid var(--accent);
  border-radius: 16px;
  padding: 12px 18px;
  font-size: 0.8rem;
  z-index: 999;
  max-width: 270px;
  backdrop-filter: blur(20px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  opacity: 0;
  transform: translateX(30px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.notif.show { opacity: 1; transform: translateX(0); }
.notif-label {
  font-size: 0.68rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--accent); margin-bottom: 5px;
}
.notif-text { color: rgba(255,255,255,0.88); line-height: 1.45; }

/* ─── Footer ─── */
footer {
  text-align: center;
  padding: 20px;
  color: rgba(255,255,255,0.3);
  font-size: 0.8rem;
  font-weight: 600;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 5px; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="notif" id="notif">
  <div class="notif-label">💬 Live Chat</div>
  <div class="notif-text" id="notifText"></div>
</div>

<header>
  <h1 class="title">🎓 The Study Squad</h1>
  <p class="subtitle">50 students. 50 personalities. One dream. Tap anyone to hear their thoughts!</p>
  <div class="stats">
    <div class="stat">📚 50 Unique Students</div>
    <div class="stat">☕ ∞ Coffee Consumed</div>
    <div class="stat">😴 Avg. 4 hrs Sleep</div>
    <div class="stat">🎯 One Goal: CRACK IT!</div>
  </div>
</header>

<div class="chat-banner" id="chatBanner"></div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>Tap any student to hear their thoughts • Conversations happen automatically every few seconds 💬</footer>

<script>
/* ════════════════════════════════════
   SVG Avatar Builder
════════════════════════════════════ */
function hair(style, c) {
  const back = [
    `<ellipse cx="40" cy="23" rx="23" ry="14" fill="${c}"/>`,
    `<path d="M17,30 Q13,65 18,74 Q40,82 62,74 Q67,65 63,30 Q40,16 17,30Z" fill="${c}"/>`,
    `<path d="M18,30 L22,12 L27,30 L32,9 L37,30 L42,9 L47,30 L52,12 L58,30 Q40,17 18,30Z" fill="${c}"/>`,
    `<path d="M17,28 Q15,13 25,11 Q23,7 33,11 Q31,6 40,9 Q40,5 50,9 Q48,6 56,11 Q66,13 63,28 Q40,16 17,28Z" fill="${c}"/>`,
    `<ellipse cx="40" cy="23" rx="23" ry="12" fill="${c}"/><circle cx="40" cy="13" r="10" fill="${c}"/>`,
    `<path d="M14,32 Q12,17 23,12 Q21,7 34,11 Q30,4 44,9 Q49,4 58,10 Q68,15 66,30 Q46,17 14,32Z" fill="${c}"/>`
  ];
  const front = [
    `<path d="M17,28 Q40,20 63,28 Q40,23 17,28Z" fill="${c}"/>`,
    `<path d="M17,30 Q21,24 23,38" fill="none" stroke="${c}" stroke-width="5" stroke-linecap="round"/>
     <path d="M63,30 Q59,24 57,38" fill="none" stroke="${c}" stroke-width="5" stroke-linecap="round"/>`,
    ``,
    `<ellipse cx="27" cy="30" rx="9" ry="6" fill="${c}"/><ellipse cx="53" cy="30" rx="9" ry="6" fill="${c}"/>`,
    ``,
    `<path d="M16,31 Q25,25 22,36" fill="none" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>
     <path d="M60,29 Q53,25 55,35" fill="none" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>`
  ];
  return { back: back[style]||back[0], front: front[style]||'' };
}

function eyes(type) {
  switch(type) {
    case 0: return `<circle cx="33" cy="44" r="3.8" fill="#222"/>
      <circle cx="47" cy="44" r="3.8" fill="#222"/>
      <circle cx="34.4" cy="42.6" r="1.4" fill="#fff"/>
      <circle cx="48.4" cy="42.6" r="1.4" fill="#fff"/>`;
    case 1: return `<circle cx="33" cy="44" r="3.8" fill="#222"/>
      <circle cx="47" cy="44" r="3.8" fill="#222"/>
      <circle cx="34.4" cy="42.6" r="1.4" fill="#fff"/>
      <circle cx="48.4" cy="42.6" r="1.4" fill="#fff"/>
      <circle cx="33" cy="44" r="5.8" fill="none" stroke="#444" stroke-width="1.5"/>
      <circle cx="47" cy="44" r="5.8" fill="none" stroke="#444" stroke-width="1.5"/>
      <line x1="38.8" y1="44" x2="41.2" y2="44" stroke="#444" stroke-width="1.5"/>
      <line x1="27.2" y1="43" x2="24.5" y2="41.5" stroke="#444" stroke-width="1.5"/>
      <line x1="52.8" y1="43" x2="55.5" y2="41.5" stroke="#444" stroke-width="1.5"/>`;
    case 2: return `<path d="M29,44 Q33,39 37,44" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M43,44 Q47,39 51,44" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="33" cy="45.5" r="2.2" fill="#222"/>
      <circle cx="47" cy="45.5" r="2.2" fill="#222"/>`;
    case 3: return `<circle cx="33" cy="44" r="5" fill="#111"/>
      <circle cx="47" cy="44" r="5" fill="#111"/>
      <circle cx="34.8" cy="42.2" r="2" fill="#fff"/>
      <circle cx="48.8" cy="42.2" r="2" fill="#fff"/>
      <circle cx="35.8" cy="42.8" r="0.8" fill="rgba(255,255,255,0.9)"/>
      <circle cx="49.8" cy="42.8" r="0.8" fill="rgba(255,255,255,0.9)"/>`;
    case 4: return `<circle cx="33" cy="44" r="3.8" fill="#222"/>
      <circle cx="47" cy="44" r="3.8" fill="#222"/>
      <circle cx="34.4" cy="42.6" r="1.4" fill="#fff"/>
      <circle cx="48.4" cy="42.6" r="1.4" fill="#fff"/>
      <path d="M29.5,40.5 Q33,38.5 36.5,40.5" fill="none" stroke="#333" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M43.5,40.5 Q47,38.5 50.5,40.5" fill="none" stroke="#333" stroke-width="1.6" stroke-linecap="round"/>`;
    default: return eyes(0);
  }
}

function mouth(type) {
  switch(type) {
    case 0: return `<path d="M33,55 Q40,62 47,55" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>`;
    case 1: return `<path d="M33,59 Q40,52 47,59" fill="none" stroke="#333" stroke-width="2.2" stroke-linecap="round"/>`;
    case 2: return `<path d="M30,54 Q40,65 50,54" fill="#fff" stroke="#222" stroke-width="1.8"/>
      <line x1="36" y1="54" x2="35.5" y2="59" stroke="#ddd" stroke-width="0.9"/>
      <line x1="40" y1="54" x2="40" y2="60" stroke="#ddd" stroke-width="0.9"/>
      <line x1="44" y1="54" x2="44.5" y2="59" stroke="#ddd" stroke-width="0.9"/>`;
    case 3: return `<circle cx="40" cy="58" r="3.5" fill="#222"/>`;
    default: return mouth(0);
  }
}

function acc(type, col) {
  switch(type) {
    case 'headphones': return `
      <path d="M19,38 Q18,16 40,16 Q62,16 61,38" fill="none" stroke="${col}" stroke-width="4.5" stroke-linecap="round"/>
      <rect x="13" y="36" width="9" height="11" rx="3.5" fill="${col}"/>
      <rect x="58" y="36" width="9" height="11" rx="3.5" fill="${col}"/>`;
    case 'graduation': return `

      <rect x="24" y="16" width="32" height="5" rx="1" fill="${col}"/>
      <line x1="58" y1="17" x2="62" y2="26" stroke="${col}" stroke-width="2.2"/>
      <circle cx="62" cy="28" r="3" fill="${col}"/>`;
    case 'coffee': return `
      <rect x="60" y="53" width="11" height="13" rx="2.5" fill="#7B3F00"/>
      <path d="M71,56 Q77,60 71,63" fill="none" stroke="#7B3F00" stroke-width="2.2"/>
      <rect x="61" y="54" width="9" height="11" rx="1.5" fill="rgba(255,255,255,0.18)"/>
      <ellipse cx="64" cy="52" rx="1.5" ry="3" fill="#aaa" opacity="0.7"/>
      <ellipse cx="68" cy="51" rx="1.5" ry="3" fill="#aaa" opacity="0.7"/>`;
    case 'book': return `
      <rect x="5" y="51" width="12" height="18" rx="2" fill="${col}"/>
      <rect x="6" y="52" width="10" height="16" rx="1.5" fill="rgba(255,255,255,0.22)"/>
      <line x1="8" y1="57" x2="14" y2="57" stroke="${col}" stroke-width="1.1" opacity="0.6"/>
      <line x1="8" y1="61" x2="14" y2="61" stroke="${col}" stroke-width="1.1" opacity="0.6"/>
      <line x1="8" y1="65" x2="14" y2="65" stroke="${col}" stroke-width="1.1" opacity="0.6"/>`;
    case 'pencil': return `
      <g transform="rotate(35,62,30)">
        <rect x="58" y="18" width="6" height="20" rx="1.5" fill="#F4D03F"/>
        <polygon points="58,38 64,38 61,46" fill="#E74C3C"/>
        <rect x="58" y="16" width="6" height="4" rx="1" fill="#ccc"/>
      </g>`;
    case 'headband': return `
      <path d="M17,26 Q40,17 63,26" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" opacity="0.9"/>`;
    case 'medal': return `
      <circle cx="64" cy="57" r="8" fill="#F4D03F"/>
      <circle cx="64" cy="57" r="6" fill="#E6B800"/>
      <text x="61" y="60.5" font-size="9" fill="#8B6914" font-weight="900">1</text>
      <line x1="64" y1="22" x2="64" y2="49" stroke="#E74C3C" stroke-width="3"/>
      <path d="M59,22 L64,17 L69,22Z" fill="#E74C3C"/>`;
    default: return '';
  }
}

function buildSVG(c) {
  const h = hair(c.hairStyle, c.hairColor);
  return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="g${c.id}" cx="38%" cy="30%" r="62%">
        <stop offset="0%" stop-color="${c.bg[0]}"/>
        <stop offset="100%" stop-color="${c.bg[1]}"/>
      </radialGradient>
      <radialGradient id="s${c.id}" cx="38%" cy="32%">
        <stop offset="0%" stop-color="${lighten(c.skin)}"/>
        <stop offset="100%" stop-color="${c.skin}"/>
      </radialGradient>
    </defs>
    <circle cx="40" cy="40" r="39" fill="url(#g${c.id})"/>
    <circle cx="40" cy="40" r="39" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    ${h.back}
    <ellipse cx="16" cy="44" rx="4" ry="5.5" fill="${c.skin}"/>
    <ellipse cx="64" cy="44" rx="4" ry="5.5" fill="${c.skin}"/>
    <circle cx="40" cy="45" r="25" fill="url(#s${c.id})"/>
    ${eyes(c.eyeType)}
    <ellipse cx="40" cy="51" rx="2.5" ry="1.8" fill="rgba(0,0,0,0.1)"/>
    ${mouth(c.mouthType)}
    <circle cx="28" cy="53" r="5.5" fill="rgba(255,160,160,0.28)"/>
    <circle cx="52" cy="53" r="5.5" fill="rgba(255,160,160,0.28)"/>
    ${h.front}
    ${acc(c.accessory, c.hairColor)}
  </svg>`;
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(r+30,255)},${Math.min(g+22,255)},${Math.min(b+18,255)})`;
}

    card.id = `c${c.id}`;
    card.style.animationDelay = `${i * 0.035}s`;
    card.style.setProperty('--fd', `${2.5 + (i * 0.11) % 1.5}s`);
    card.style.setProperty('--fds', `${(i * 0.23) % 2.5}s`);
    card.innerHTML = `
      <div class="avatar-wrap">
        ${buildSVG(c)}
        <div class="emoji-badge">${c.emoji}</div>
      </div>
      <div class="char-name">${c.name}</div>
      <div class="char-label">${c.label}</div>`;
    card.addEventListener('click', () => clickChar(c, card));
    grid.appendChild(card);
  });
}

/* ─── Click interaction ─── */
let activeBubble = null;
function clickChar(c, card) {
  if (activeBubble) { activeBubble.remove(); activeBubble = null; }
  const text = c.says[Math.floor(Math.random() * c.says.length)];
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;
  card.appendChild(bub);
  activeBubble = bub;
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  setTimeout(() => { if (bub.parentNode) bub.remove(); if (activeBubble === bub) activeBubble = null; }, 3200);
}

/* ─── Auto conversations ─── */
const accentCols = ['#6EE7F7','#FFD166','#FF6B9D','#A8E6CF','#FFCBA4','#C3A6FF','#80CBC4','#FFAB91'];
let convoLock = false;

function autoConvo() {
  if (convoLock) return;
  convoLock = true;
  const i = Math.floor(Math.random() * chars.length);
  let j = Math.floor(Math.random() * chars.length);
  while (j === i) j = Math.floor(Math.random() * chars.length);

  const a = chars[i], b = chars[j];
  const ca = document.getElementById(`c${a.id}`);
  const cb = document.getElementById(`c${b.id}`);
  const said = a.says[Math.floor(Math.random() * a.says.length)];
  const resp = b.responds[Math.floor(Math.random() * b.responds.length)];

  ca.classList.add('talking');
  cb.classList.add('listening');

  // Bubble A
  const bA = document.createElement('div'); bA.className = 'bubble'; bA.textContent = said; ca.appendChild(bA);
  showNotif(`<b>${a.name}</b> says: "${said}"`);
  addBannerMsg(a.name, a.emoji, said, accentCols[i % accentCols.length]);

  setTimeout(() => {
    bA.remove();
    const bB = document.createElement('div'); bB.className = 'bubble'; bB.textContent = resp; cb.appendChild(bB);
    showNotif(`<b>${b.name}</b> replies: "${resp}"`);
    addBannerMsg(b.name, b.emoji, resp, accentCols[j % accentCols.length]);

    setTimeout(() => {
      bB.remove();
      ca.classList.remove('talking');
      cb.classList.remove('listening');
      hideNotif();
      convoLock = false;
    }, 2800);
  }, 2200);
}

function showNotif(html) {
  notifText.innerHTML = html;
  notif.classList.add('show');
}
function hideNotif() {
  notif.classList.remove('show');
}

function addBannerMsg(name, emoji, text, color) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.style.borderLeftColor = color;
  div.innerHTML = `<span style="font-size:1.1rem">${emoji}</span><span><b>${name}:</b> ${text}</span>`;
  banner.prepend(div);
  while (banner.children.length > 4) banner.removeChild(banner.lastChild);
}

/* ─── Starfield ─── */
function makeStars() {
  const s = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const d = document.createElement('div'); d.className = 'star';
    const sz = Math.random() * 2.8 + 0.4;
    Object.assign(d.style, {
      width: sz + 'px', height: sz + 'px',
      left: Math.random() * 100 + '%', top: Math.random() * 100 + '%',
      '--dur': (Math.random() * 3 + 2) + 's',
      '--del': (Math.random() * 5) + 's'
    });
    s.appendChild(d);
  }
}

/* ─── Boot ─── */
makeStars();
renderAll();
setTimeout(autoConvo, 1800);
setInterval(autoConvo, 6000);
</script>
